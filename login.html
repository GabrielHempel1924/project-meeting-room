<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body class="d-flex align-items-center py-4">

    <div class="position-absolute top-0 end-0 p-3">
        <button class="btn btn-link custom-theme-btn" id="theme-toggle" aria-label="Toggle Theme">
            <i class="bi bi-moon-fill fs-4" id="theme-icon"></i>
        </button>
    </div>

    <main class="w-100 m-auto form-signin">
        <div class="card custom-card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h1 class="h3 mb-3 fw-bold custom-text-primary">Welcome Back</h1>
                    <p class="custom-text-secondary">Please enter your credentials to access the platform.</p>
                </div>

                <form id="login-form" novalidate>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control custom-input" id="username" placeholder="Username" autocomplete="username">
                        <label for="username">Username</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control custom-input" id="password" placeholder="Password" autocomplete="current-password">
                        <label for="password">Password</label>
                    </div>

                    <div id="error-message" class="alert alert-danger d-none py-2 text-center" role="alert" style="font-size: 0.9rem;">
                        </div>

                    <button class="btn btn-primary w-100 py-2 custom-btn" type="submit" id="login-btn">
                        <span id="btn-text">Sign In</span>
                        <span class="spinner-border spinner-border-sm d-none" id="btn-loader" role="status" aria-hidden="true"></span>
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small class="custom-text-secondary"><i class="bi bi-shield-lock me-1"></i> Authenticated via Corporate LDAP</small>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
